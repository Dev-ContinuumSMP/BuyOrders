name: AxOrdersAddon
version: 1.0.0
main: com.example.axorders.AxOrdersAddon
api-version: '1.21'
folia-supported: true
description: Standalone buy orders addon for AxAuctions
authors: [ Johnny ]
depend: [ AxAuctions ]

commands:
  orders:
    description: Open the AxAuctions buy orders GUI
    usage: /orders [material]
    aliases: [ order ]
  buyorder:
    description: Create a buy order
    usage: /buyorder <material> <amount> <priceEach> | /buyorder hand <amount> <priceEach>
    aliases: [ axorder ]

permissions:
  axorders.use:
    description: Allows players to view and fill buy orders
    default: true
  axorders.create:
    description: Allows players to create buy orders
    default: true
  axorders.admin:
    description: Allows admins to cancel any order
    default: op
